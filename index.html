<html lang="ko">
<head>
<meta charset="UTF-8" />

<title>5 Drivers 자가진단</title>
<style>
:root {
  --bg:#f4f6fb; --card:#fff; --line:#e5e7eb; --text:#18212f; --muted:#6b7280;
  --blue1:#60a5fa; --blue2:#2563eb; --shadow:0 12px 28px rgba(15,23,42,.08); --radius:22px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;line-height:1.6}
.wrap{width:min(920px,100%);margin:0 auto;padding:18px 14px 48px}
.card,.hero,.question-card,.result-card,.detail-shell,.info-box{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero{padding:22px 18px;margin-bottom:16px}
h1{margin:0 0 10px;font-size:1.55rem;line-height:1.3}
h2{margin:0;font-size:1.15rem}
p,li{font-size:.98rem}
.muted{color:var(--muted)}
.guide{padding-left:20px;margin:10px 0 0}
.question-card{padding:18px;margin:14px 0}
.question-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.question-title{font-weight:800;font-size:1.05rem}
.rule-badge{padding:6px 10px;border-radius:999px;background:#eef2ff;color:#374151;font-size:.82rem}
.item{border:1px solid var(--line);border-radius:16px;padding:12px 12px;margin-top:10px}
.item-row{display:grid;grid-template-columns:28px 1fr 96px;gap:10px;align-items:center}
.item-key{font-weight:800;text-transform:uppercase}
select{width:100%;padding:12px 10px;border-radius:12px;border:1px solid #cbd5e1;background:#fff;font-size:.95rem}
.actions{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(244,246,251,0),rgba(244,246,251,1) 25%);padding-top:22px;margin-top:10px}
.btn-row{display:flex;gap:10px}
button{appearance:none;border:none;border-radius:16px;padding:14px 16px;font-size:1rem;font-weight:800;cursor:pointer}
.primary{background:#2563eb;color:#fff;flex:1}
.secondary{background:#e5e7eb;color:#111827}
.error-box{display:none;margin:0 0 14px;padding:14px 16px;border-radius:16px;border:1px solid #fecaca;background:#fef2f2;color:#991b1b}
.result-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 16px}
.result-title{font-size:1.32rem;font-weight:900}
.result-sub{font-size:.93rem;color:var(--muted)}
.result-list{display:grid;gap:14px}
.result-card{padding:18px;text-align:left;cursor:pointer;transition:.18s transform,.18s box-shadow}
.result-card:hover{transform:translateY(-2px)}
.result-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
.result-name{font-size:1.06rem;font-weight:900;color:#111827}
.result-score{font-size:1.12rem;font-weight:900;color:#111827;white-space:nowrap}
.bar{height:20px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin-bottom:12px}
.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue1),var(--blue2))}
.result-desc{font-size:.96rem;color:#6b7280}
.detail-shell{overflow:hidden;background:#fff}
.detail-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#111827;color:#fff}
.icon-btn{width:46px;height:46px;border-radius:999px;background:transparent;color:#fff;font-size:1.5rem;padding:0;display:flex;align-items:center;justify-content:center}
.detail-body{display:grid;grid-template-columns:290px 1fr;min-height:560px}
.detail-side{color:#fff;padding:38px 26px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.side-icon{width:98px;height:98px;display:flex;align-items:center;justify-content:center;margin-bottom:34px;color:#fff}
.svg-icon{width:100%;height:100%;display:block}
.side-no{font-size:1.05rem;font-weight:800;opacity:.78;letter-spacing:1px;margin-bottom:14px}
.side-title{font-size:2.1rem;font-weight:900;line-height:1.15;margin-bottom:8px}
.side-en{font-size:.92rem;opacity:.8;margin-bottom:14px}
.side-line{width:64px;height:4px;border-radius:999px;background:rgba(255,255,255,.75);margin:14px 0 26px}
.side-summary{font-size:1rem;line-height:1.75;opacity:.95}
.detail-main{padding:24px 28px;background:#f6f5f2}
.info-box{padding:18px 18px 16px;background:#f8fafc;margin-bottom:20px}
.info-title{display:flex;align-items:center;gap:10px;font-size:1.5rem;font-weight:900;margin-bottom:12px}
.info-title small{font-size:1rem}
.info-title.blue{color:#0f3a74}
.info-title.teal{color:#0f8e97}
.info-title.orange{color:#dc7f63}
.info-list{margin:0;padding-left:24px}
.info-list li{margin:6px 0;color:#374151}
.hidden{display:none!important}
@media (max-width:760px){
  .wrap{padding:12px 10px 36px}
  .item-row{grid-template-columns:24px 1fr 84px}
  .detail-body{grid-template-columns:1fr}
  .detail-side{padding:28px 22px}
  .side-title{font-size:1.95rem}
  .detail-main{padding:16px}
  .result-name{font-size:1.02rem}
}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero" id="introScreen">
    <h1>5 Drivers 자가진단</h1>
    <p class="muted">각 문항의 다섯 문장에 대해 <strong>0~10점</strong>을 한 번씩만 배정하세요. 각 문항 안에는 <strong>반드시 5점이 하나</strong> 들어가야 합니다.</p>
    <ul class="guide">

  </section>

  <section id="detailScreen" class="hidden"></section>
</div>

const scoreMap = {"1": {"BS": "a", "BP": "b", "TH": "c", "HU": "d", "PP": "e"}, "2": {"BS": "e", "BP": "a", "TH": "b", "HU": "c", "PP": "d"}, "3": {"BS": "d", "BP": "e", "TH": "a", "HU": "b", "PP": "c"}, "4": {"BS": "c", "BP": "d", "TH": "e", "HU": "a", "PP": "b"}, "5": {"BS": "d", "BP": "e", "TH": "a", "HU": "b", "PP": "c"}, "6": {"BS": "c", "BP": "d", "TH": "e", "HU": "a", "PP": "b"}, "7": {"BS": "b", "BP": "c", "TH": "d", "HU": "e", "PP": "a"}, "8": {"BS": "a", "BP": "b", "TH": "c", "HU": "d", "PP": "e"}, "9": {"BS": "e", "BP": "a", "TH": "b", "HU": "c", "PP": "d"}, "10": {"BS": "d", "BP": "e", "TH": "a", "HU": "b", "PP": "c"}, "11": {"BS": "c", "BP": "d", "TH": "e", "HU": "a", "PP": "b"}, "12": {"BS": "b", "BP": "c", "TH": "d", "HU": "e", "PP": "a"}};

const questionsEl = document.getElementById('questions');
const errorBox = document.getElementById('errorBox');
const introScreen = document.getElementById('introScreen');
const actionBar = document.getElementById('actionBar');
const resultScreen = document.getElementById('resultScreen');
const resultList = document.getElementById('resultList');
const detailScreen = document.getElementById('detailScreen');

function makeSelect(qNum, key) {
  const select = document.createElement('select');
  select.dataset.q = qNum;
  select.dataset.key = key;
  const placeholder = document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = '점수 선택';
  select.appendChild(placeholder);
  for (let i=0; i<=10; i++) {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = i + '점';
    select.appendChild(opt);
  }
  return select;
}

function renderQuestions() {
  questionsEl.innerHTML = '';
  questions.forEach(q => {
    const card = document.createElement('section');
    card.className = 'question-card';
    const head = document.createElement('div');
    head.className = 'question-head';
    head.innerHTML = `<div class="question-title">${q.n}번 문항</div><div class="rule-badge">중복 없이 0~10점 · 5점 필수</div>`;
    card.appendChild(head);
    q.items.forEach(([key, text]) => {
      const item = document.createElement('div');
      item.className = 'item';
      const row = document.createElement('div');
      row.className = 'item-row';
      const keyEl = document.createElement('div');
      keyEl.className = 'item-key';
      keyEl.textContent = key;
      const textEl = document.createElement('div');
      textEl.textContent = text;
      row.appendChild(keyEl);
      row.appendChild(textEl);
      row.appendChild(makeSelect(q.n, key));
      item.appendChild(row);
      card.appendChild(item);
    });
    questionsEl.appendChild(card);
  });
}

function emptyScores() { return { BP:0, PP:0, BS:0, TH:0, HU:0 }; }

function validateAll() {
  errorBox.style.display = 'none';
  errorBox.innerHTML = '';
  for (const q of questions) {
    const picks = [...document.querySelectorAll(`select[data-q="${q.n}"]`)].map(s => s.value);
    if (picks.some(v => v === '')) return { ok:false, msg:`${q.n}번 문항의 점수를 모두 선택해주세요.` };
    const nums = picks.map(Number);
    if ((new Set(nums)).size !== nums.length) return { ok:false, msg:`${q.n}번 문항에는 같은 점수를 중복해서 넣을 수 없습니다.` };
    if (!nums.includes(5)) return { ok:false, msg:`${q.n}번 문항에는 반드시 5점이 하나 들어가야 합니다.` };
  }
  return { ok:true };
}

function collectScores() {
  const total = emptyScores();
  for (const q of questions) {
    const answers = {};
    document.querySelectorAll(`select[data-q="${q.n}"]`).forEach(sel => answers[sel.dataset.key] = Number(sel.value));
    for (const type of Object.keys(total)) {
      const key = scoreMap[q.n][type];
      total[type] += answers[key];
    }
  }
  return total;
}

function typeOrder(scores) {
  return Object.entries(scores).sort((a,b)=> b[1]-a[1]).map(([type]) => type);
}

function renderResultList(scores) {
  resultList.innerHTML = '';
  const ordered = Object.entries(scores).sort((a,b)=> b[1]-a[1]);
  ordered.forEach(([type, score]) => {
    const p = profiles[type];
    const card = document.createElement('button');
    card.className = 'result-card';
    card.type = 'button';
    card.innerHTML = `
      <div class="result-top">
        <div class="result-name">${p.labelKo} (${p.label})</div>
        <div class="result-score">${score}점</div>
      </div>
      <div class="bar"><div class="fill" style="width:${Math.max(8, score/120*100)}%"></div></div>
      <div class="result-desc">${p.short}</div>
    `;
    card.addEventListener('click', () => renderDetail(type, scores));
    resultList.appendChild(card);
  });
}

function renderDetail(type, scores) {
  const p = profiles[type];
  const toList = () => {
    detailScreen.classList.add('hidden');
    resultScreen.classList.remove('hidden');
    window.scrollTo({top:0, behavior:'smooth'});
  };
  detailScreen.innerHTML = `
    <div class="detail-shell">
      <div class="detail-toolbar">
        <button class="icon-btn" id="backBtn" aria-label="뒤로가기">‹</button>

      </div>
      <div class="detail-body">
        <div class="detail-side" style="background:${p.color}">
          <div class="side-icon">${p.icon}</div>
          <div class="side-no">${p.no}</div>
          <div class="side-title">${p.labelKo}</div>
          <div class="side-en">(${p.label})</div>
          <div class="side-line"></div>
          <div class="side-summary">${p.summary}</div>
        </div>
        <div class="detail-main">
          <div class="info-box">
            <div class="info-title blue"><span>👥</span><span>특징</span></div>
            <ul class="info-list">${p.features.map(v => `<li>${v}</li>`).join('')}</ul>
          </div>
          <div class="info-box">
            <div class="info-title teal"><span>👍</span><span>긍정적 강점</span></div>
            <ul class="info-list">${p.strengths.map(v => `<li>${v}</li>`).join('')}</ul>
          </div>
          <div class="info-box">
            <div class="info-title orange"><span>⚡</span><span>스트레스 요인</span></div>
            <ul class="info-list">${p.stress.map(v => `<li>${v}</li>`).join('')}</ul>
          </div>
        </div>
      </div>
    </div>
  `;
  resultScreen.classList.add('hidden');
  detailScreen.classList.remove('hidden');
  document.getElementById('backBtn').addEventListener('click', toList);
  document.getElementById('refreshTopBtn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('calcBtn').addEventListener('click', () => {
  const check = validateAll();
  if (!check.ok) {
    errorBox.textContent = check.msg;
    errorBox.style.display = 'block';
    window.scrollTo({top:0, behavior:'smooth'});
    return;
  }
  const scores = collectScores();
  introScreen.classList.add('hidden');
  questionsEl.classList.add('hidden');
  actionBar.classList.add('hidden');
  detailScreen.classList.add('hidden');
  resultScreen.classList.remove('hidden');
  renderResultList(scores);
  window.scrollTo({top:0, behavior:'smooth'});
});

document.getElementById('backToTestBtn').addEventListener('click', () => {
  resultScreen.classList.add('hidden');
  detailScreen.classList.add('hidden');
  introScreen.classList.remove('hidden');
  questionsEl.classList.remove('hidden');
  actionBar.classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
});

document.getElementById('resetBtn').addEventListener('click', () => {
  document.querySelectorAll('select').forEach(s => s.value = '');
  errorBox.style.display = 'none';
  window.scrollTo({top:0, behavior:'smooth'});
});

renderQuestions();
</script>
