<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kahler's 5 Drivers 설문</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --ok: #059669;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    .wrap {
      width: min(860px, 100%);
      margin: 0 auto;
      padding: 18px 14px 60px;
    }
    .hero, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 22px 18px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.6rem;
      line-height: 1.3;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 1.15rem;
    }
    p, li { font-size: 0.98rem; }
    .muted { color: var(--muted); }
    .guide {
      margin: 12px 0 0;
      padding-left: 20px;
    }
    .question-card {
      padding: 18px;
      margin: 14px 0;
    }
    .question-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .question-title {
      font-weight: 700;
      font-size: 1.03rem;
    }
    .question-status {
      font-size: 0.88rem;
      padding: 5px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: var(--primary-dark);
      border: 1px solid #c7d2fe;
    }
    .question-status.error {
      background: #fef2f2;
      color: var(--danger);
      border-color: #fecaca;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-top: 1px dashed var(--line);
    }
    .row:first-of-type { border-top: 0; }
    .statement {
      font-size: 0.96rem;
    }
    .choice {
      width: 100%;
      height: 42px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #fff;
      padding: 0 10px;
      font-size: 0.95rem;
    }
    .actions {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, rgba(246,247,251,1), rgba(246,247,251,0.92), rgba(246,247,251,0));
      padding-top: 12px;
      margin-top: 18px;
    }
    .action-box {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      border: 0;
      border-radius: 14px;
      min-height: 48px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary {
      background: #eef2ff;
      color: var(--primary-dark);
      border: 1px solid #c7d2fe;
    }
    .notice {
      margin-top: 10px;
      font-size: 0.92rem;
      color: var(--muted);
    }
    .error-box {
      display: none;
      margin: 14px 0;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      border-radius: 16px;
      padding: 14px;
      white-space: pre-line;
    }
    .result {
      display: none;
      margin-top: 18px;
      padding: 20px;
    }
    .result-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .result-title {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .result-desc {
      color: var(--muted);
      margin-bottom: 18px;
    }
    .scores {
      display: grid;
      gap: 12px;
    }
    .score-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fafafa;
    }
    .score-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .bar {
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar > span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #60a5fa, #2563eb);
      border-radius: 999px;
    }
    .subtext {
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .footer-note {
      margin-top: 16px;
      font-size: 0.88rem;
      color: var(--muted);
    }
    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr 76px; gap: 10px; }
      .question-card, .hero, .result { padding: 16px; }
      .action-box { grid-template-columns: 1fr; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Kahler's 5 Drivers 모바일 진단</h1>
      <p class="muted">각 문항마다 5개의 문장을 보고, 나에게 가장 가까운 정도에 따라 <strong>0~10점</strong>을 각각 다르게 선택하세요.</p>
      <ul class="guide">
        <li>각 문항 안에서 점수는 <strong>서로 중복되면 안 됩니다.</strong></li>
        <li>각 문항 안에는 <strong>반드시 5점이 하나 포함</strong>되어야 합니다.</li>
        <li>원본 설문 안내에 따르면 가장 맞는 문장은 보통 <strong>7~10점</strong>, 가장 덜 맞는 문장은 <strong>0~3점</strong>으로 주는 방식입니다.</li>
      </ul>
      <p class="notice">제출 버튼 없이 이 페이지 안에서 바로 자동 계산됩니다.</p>
    </section>

    <div id="questions"></div>

    <div id="errorBox" class="error-box"></div>

    <div class="actions">
      <div class="action-box">
        <button class="btn-primary" id="calcBtn">결과 계산하기</button>
        <button class="btn-secondary" id="resetBtn">전체 초기화</button>
      </div>
    </div>

    <section id="result" class="card result"></section>
  </div>

  <script>
    const questions = [
      { n: 1, items: [
        ['a', '인내심은 중요한 자산이다.'],
        ['b', '나는 사람들이 최선을 다해 일을 제대로 하는 모습을 보고 싶다.'],
        ['c', '내가 들이는 노력에 비해 더 많은 일을 해내야 한다고 느낀다.'],
        ['d', '나는 너무 많은 일을 막판에 처리하는 편이다.'],
        ['e', '전체적으로 보면 나는 다른 사람의 바람에 내가 적응하는 편이, 그들이 내 바람에 맞추는 것보다 더 많다.']
      ]},
      { n: 2, items: [
        ['a', '대충 하거나 부주의한 태도는 나를 불편하게 만든다.'],
        ['b', '무언가를 끝내는 것보다 계속 해나가는 과정이 더 흥미롭다.'],
        ['c', '사람들이 말을 느리게 하면 중간에 끼어들거나 대신 끝맺고 싶어진다.'],
        ['d', '사람들에게 무엇이 필요한지 짐작하는 데 상상력이 꽤 있는 편이다.'],
        ['e', '누군가 감정적으로 반응하면 나는 농담으로 넘기거나 비판적으로 반응하는 경우가 많다.']
      ]},
      { n: 3, items: [
        ['a', '나는 일이 힘들어도 괜찮다. 언제든 에너지를 끌어낼 수 있다.'],
        ['b', '어딘가에 갈 때는 필요한 최소한의 시간만 들이는 편을 선호한다.'],
        ['c', '누군가가 나를 좋아하지 않는다면, 좋아하게 만들려고 애쓰거나 아예 멀어진다.'],
        ['d', '나는 상처를 느끼는 일이 드문 편이다.'],
        ['e', '제대로 해야 하는 일이라면 차라리 내가 직접 하는 편이 낫다.']
      ]},
      { n: 4, items: [
        ['a', '느린 사람을 보면 조급해진다.'],
        ['b', '무언가를 결정하기 전에 다른 사람의 바람을 먼저 고려하는 편이다.'],
        ['c', '감정이 크게 올라와도 겉으로는 차분한 표정을 유지한다.'],
        ['d', '나는 질 낮은 결과물에 대해 변명하지 않는다.'],
        ['e', '일의 끝마무리 단계가 왠지 마음에 들지 않을 때가 있다.']
      ]},
      { n: 5, items: [
        ['a', '나는 일에 많은 노력을 쏟는 편이다.'],
        ['b', '때로는 일단 해보고, 논의는 나중에 하는 것이 더 낫다.'],
        ['c', '나는 부탁을 하는 데 신중한 편이다.'],
        ['d', '다른 사람이 나를 돌보게 두는 편은 아니다.'],
        ['e', '가끔은 다른 사람을 바로잡고 싶은 마음을 참기 어렵다.']
      ]},
      { n: 6, items: [
        ['a', '가끔 나는 너무 빨리 말한다.'],
        ['b', '사람들이 나 때문에 속상해하거나 불쾌해하면 불편하다.'],
        ['c', '사람들이 일을 지나치게 호들갑스럽게 만드는 것이 싫다.'],
        ['d', '어떤 일이든 더 개선할 수 있다고 생각한다.'],
        ['e', '나는 "쉬운 길"을 믿지 않는다.']
      ]},
      { n: 7, items: [
        ['a', '나는 다른 사람을 배려하려고 많이 노력하는 편이다.'],
        ['b', '이제 한계라고 느껴도 대체로 잘 버텨낸다.'],
        ['c', '시간이 더 걸려도 일을 정말 잘 해내는 편을 선호한다.'],
        ['d', '나는 일을 시작해 놓고 점점 에너지나 흥미를 잃는 경향이 있다.'],
        ['e', '끝내고 싶은 일이 너무 많다 보니 결국 시간이 모자랄 때가 있다.']
      ]},
      { n: 8, items: [
        ['a', '나는 흔히 말하는 "여린" 사람은 아니다.'],
        ['b', '다시 하는 것보다 처음부터 제대로 하는 편을 선호한다.'],
        ['c', '상대가 내 말을 이해했는지 확신이 없어서 같은 말을 반복할 때가 있다.'],
        ['d', '할 일이 많을수록 오히려 에너지가 가장 높아질 때가 많다.'],
        ['e', '누군가가 정말 원하면 거절하기가 꽤 어렵다.']
      ]},
      { n: 9, items: [
        ['a', '나는 단어를 정확하게 쓰는 것을 좋아한다.'],
        ['b', '시작하기 전에 여러 대안을 탐색해보는 것을 좋아한다.'],
        ['c', '첫 번째 일을 끝내기도 전에 이미 다음 일을 생각하고 있는 경우가 많다.'],
        ['d', '상대가 나를 좋아한다는 확신이 들면 더 편안해진다.'],
        ['e', '남들이 알아차리지 못할 정도로 많은 것을 참고 견딜 수 있다.']
      ]},
      { n: 10, items: [
        ['a', '그저 빨리 끝내기만 하려는 사람들을 보면 짜증이 난다.'],
        ['b', '계획부터 세우기보다 일단 뛰어드는 편이 좋다.'],
        ['c', '상대가 내가 원하는 것을 모르면 직접 말하기보다 그냥 넘어가고 싶을 때가 있다.'],
        ['d', '다른 사람들은 나보다 먼저 징징대거나 불평을 시작하는 편이다.'],
        ['e', '남이 나를 고치는 것보다 내가 스스로 고치는 편을 선호한다.']
      ]},
      { n: 11, items: [
        ['a', '시간이 20%만 더 있어도 훨씬 여유로울 것 같다.'],
        ['b', '사람들이 내게 말할 때 자주 웃고 고개를 끄덕인다.'],
        ['c', '사람들이 흥분해도 나는 매우 차분하고 이성적으로 있을 수 있다.'],
        ['d', '나는 일을 잘해내고도 스스로를 비판할 수 있다.'],
        ['e', '고려해야 할 것이 너무 많아서 일을 끝맺기 어려울 때가 있다.']
      ]},
      { n: 12, items: [
        ['a', '누군가가 나를 좋아하는지 아닌지 직감적으로 잘 느끼는 편이다.'],
        ['b', '장기적으로 보면 감정보다 의무감과 이성이 더 도움이 된다고 생각한다.'],
        ['c', '무언가를 어떻게 개선할 수 있을지 빠르게 알아차리는 편이다.'],
        ['d', '어떤 사람들은 일을 지나치게 단순하게 보는 습관이 있다.'],
        ['e', '할 일이 많을수록 오히려 더 많은 일을 해내는 때가 있다.']
      ]}
    ];

    const mapping = {
      BS: { label: 'Be Strong', labelKo: '강해야 해', desc: '감정을 드러내기보다 버티고 견디려는 경향이 강합니다. 책임감과 침착함이 장점이지만, 도움을 요청하거나 감정을 표현하는 데는 인색할 수 있습니다.' },
      BP: { label: 'Be Perfect', labelKo: '완벽해야 해', desc: '정확함과 기준을 중요하게 여기며, 제대로 해내고 싶은 마음이 강합니다. 꼼꼼함은 강점이지만 자기비판과 과도한 수정으로 이어질 수 있습니다.' },
      TH: { label: 'Try Hard', labelKo: '열심히 해야 해', desc: '노력 자체에 큰 가치를 두고 애쓰는 경향이 있습니다. 열정과 성실함은 강점이지만, 힘을 많이 쓰고도 마무리가 약해질 수 있습니다.' },
      HU: { label: 'Hurry Up', labelKo: '서둘러야 해', desc: '속도와 즉시성을 중시하며 빠르게 움직이려는 경향이 강합니다. 추진력은 좋지만 조급함과 성급한 판단이 나타날 수 있습니다.' },
      PP: { label: 'Please People', labelKo: '사람을 만족시켜야 해', desc: '관계와 조화를 중요하게 여기며 상대의 기대를 잘 살피는 편입니다. 배려심은 장점이지만 거절의 어려움이나 자기욕구의 후순위화가 생길 수 있습니다.' }
    };

    const scoreMap = {
      1: { BS: 'a', BP: 'b', TH: 'c', HU: 'd', PP: 'e' },
      2: { BS: 'e', BP: 'a', TH: 'b', HU: 'c', PP: 'd' },
      3: { BS: 'd', BP: 'e', TH: 'a', HU: 'b', PP: 'c' },
      4: { BS: 'c', BP: 'd', TH: 'e', HU: 'a', PP: 'b' },
      5: { BS: 'd', BP: 'e', TH: 'a', HU: 'b', PP: 'c' },
      6: { BS: 'c', BP: 'd', TH: 'e', HU: 'a', PP: 'b' },
      7: { BS: 'b', BP: 'c', TH: 'd', HU: 'e', PP: 'a' },
      8: { BS: 'a', BP: 'b', TH: 'c', HU: 'd', PP: 'e' },
      9: { BS: 'e', BP: 'a', TH: 'b', HU: 'c', PP: 'd' },
      10: { BS: 'd', BP: 'e', TH: 'a', HU: 'b', PP: 'c' },
      11: { BS: 'c', BP: 'd', TH: 'e', HU: 'a', PP: 'b' },
      12: { BS: 'b', BP: 'c', TH: 'd', HU: 'e', PP: 'a' }
    };

    const container = document.getElementById('questions');
    const resultBox = document.getElementById('result');
    const errorBox = document.getElementById('errorBox');

    function makeSelect(qNum, key) {
      const select = document.createElement('select');
      select.className = 'choice';
      select.dataset.question = qNum;
      select.dataset.key = key;
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '선택';
      select.appendChild(placeholder);
      for (let i = 0; i <= 10; i++) {
        const opt = document.createElement('option');
        opt.value = String(i);
        opt.textContent = String(i);
        select.appendChild(opt);
      }
      select.addEventListener('change', () => updateQuestionStatus(qNum));
      return select;
    }

    function renderQuestions() {
      questions.forEach(q => {
        const card = document.createElement('section');
        card.className = 'card question-card';
        card.id = `question-${q.n}`;

        const head = document.createElement('div');
        head.className = 'question-head';
        head.innerHTML = `
          <div class="question-title">문항 ${q.n}</div>
          <div class="question-status" id="status-${q.n}">입력 전</div>
        `;
        card.appendChild(head);

        q.items.forEach(([key, text]) => {
          const row = document.createElement('div');
          row.className = 'row';
          const statement = document.createElement('div');
          statement.className = 'statement';
          statement.innerHTML = `<strong>${key.toUpperCase()}.</strong> ${text}`;
          row.appendChild(statement);
          row.appendChild(makeSelect(q.n, key));
          card.appendChild(row);
        });

        container.appendChild(card);
      });
    }

    function getQuestionValues(qNum) {
      return Array.from(document.querySelectorAll(`select[data-question="${qNum}"]`)).map(sel => sel.value);
    }

    function validateQuestion(qNum) {
      const values = getQuestionValues(qNum);
      if (values.some(v => v === '')) {
        return { ok: false, state: 'incomplete', message: '아직 선택이 덜 됨' };
      }
      const nums = values.map(Number);
      const unique = new Set(nums);
      if (unique.size !== nums.length) {
        return { ok: false, state: 'duplicate', message: '중복 점수 있음' };
      }
      if (!nums.includes(5)) {
        return { ok: false, state: 'missing5', message: '5점 포함 필요' };
      }
      return { ok: true, state: 'ok', message: '입력 완료' };
    }

    function updateQuestionStatus(qNum) {
      const status = document.getElementById(`status-${qNum}`);
      const check = validateQuestion(qNum);
      status.textContent = check.message;
      status.classList.toggle('error', !check.ok && check.state !== 'incomplete');
      if (check.state === 'incomplete') status.classList.remove('error');
    }

    function collectScores() {
      const totals = { BS: 0, BP: 0, TH: 0, HU: 0, PP: 0 };
      const errors = [];

      questions.forEach(q => {
        const check = validateQuestion(q.n);
        if (!check.ok) {
          errors.push(`문항 ${q.n}: ${check.message}`);
          return;
        }
        const selects = Array.from(document.querySelectorAll(`select[data-question="${q.n}"]`));
        const answerMap = {};
        selects.forEach(sel => { answerMap[sel.dataset.key] = Number(sel.value); });
        Object.entries(scoreMap[q.n]).forEach(([driver, key]) => {
          totals[driver] += answerMap[key];
        });
      });
      return { totals, errors };
    }

    function renderResult(totals) {
      const entries = Object.entries(totals).sort((a, b) => b[1] - a[1]);
      const maxScore = entries[0][1];
      const winners = entries.filter(([_, v]) => v === maxScore).map(([k]) => k);
      const title = winners.length === 1
        ? `${mapping[winners[0]].labelKo} 유형` : `${winners.map(k => mapping[k].labelKo).join(' / ')} 복합 유형`;
      const desc = winners.length === 1
        ? mapping[winners[0]].desc
        : '상위 점수가 동점으로 나와 두 가지 이상 경향이 함께 나타났습니다. 실제 모습은 상황에 따라 이들 특성이 섞여 표현될 수 있습니다.';

      const maxPossible = 120;
      resultBox.innerHTML = `
        <div class="result-badge">자동 분석 완료</div>
        <div class="result-title">${title}</div>
        <div class="result-desc">${desc}</div>
        <div class="scores">
          ${entries.map(([key, value]) => `
            <div class="score-item">
              <div class="score-top">
                <span>${mapping[key].labelKo} <span class="muted">(${mapping[key].label})</span></span>
                <span>${value}점</span>
              </div>
              <div class="bar"><span style="width:${(value / maxPossible) * 100}%"></span></div>
              <div class="subtext">${mapping[key].desc}</div>
            </div>
          `).join('')}
        </div>
        <div class="footer-note">이 결과는 자기이해를 돕기 위한 간이 해석입니다. 공식 진단이나 전문 상담을 대체하지는 않습니다.</div>
      `;
      resultBox.style.display = 'block';
      resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    document.getElementById('calcBtn').addEventListener('click', () => {
      const { totals, errors } = collectScores();
      if (errors.length) {
        errorBox.style.display = 'block';
        errorBox.textContent = '아래 항목을 먼저 확인해주세요.\n\n' + errors.join('\n');
        resultBox.style.display = 'none';
        errorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }
      errorBox.style.display = 'none';
      renderResult(totals);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      document.querySelectorAll('select').forEach(sel => { sel.value = ''; });
      document.querySelectorAll('.question-status').forEach(el => {
        el.textContent = '입력 전';
        el.classList.remove('error');
      });
      errorBox.style.display = 'none';
      resultBox.style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderQuestions();
  </script>
</body>
</html>
